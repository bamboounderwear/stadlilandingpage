<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadli UI Mockup</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --white: #ffffff;    
            --black: #020202;
            --gray-100: #e8e8e8; 
            --gray-200: #d6d6d6; 
            --gray-300: #c0c0c0;
            --gray-400: #929292; 
            --gray-500: #6a6a6a; 
            --gray-600: #484848;
            --gray-700: #303030; 
            --gray-800: #1a1a1a; 
            --gray-900: #010101;
            --primary: var(--gray-900);
            --secondary: var(--gray-600);

            /* Spectrum tokens — marketing surface only */
            --spec-cyan: #00b0d8;
        }

        body {
            background-color: var(--black);
            font-family: 'Inter', sans-serif;
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 1200x600 Container representing the screen/app */
        .mockup-container {
            width: 1200px;
            height: 600px;
            background-color: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* Feature Cards */
        .feature-card {
            background-color: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 12px;
            padding: 24px 32px;
            width: 240px;
            height: 90px;
            position: absolute;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .feature-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
            color: var(--gray-100);
            line-height: 1.2;
        }

        /* Precision Positioning to sit exactly on the corners 
           of the SVG rectangle (X: 300 to 900, Y: 170 to 430)
        */
        .top-left { top: 125px; left: 180px; }
        .top-right { top: 125px; left: 780px; }
        .bottom-left { top: 385px; left: 180px; }
        .bottom-right { top: 385px; left: 780px; }

        /* Central Logo */
        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
        }

        /* SVG Lines Layer */
        .lines-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Faint baseline rectangle connecting the cards */
        .base-line {
            stroke: var(--gray-800);
            stroke-width: 1.5;
            fill: none;
        }

        /* Moving Data Effect 
           Rectangle perimeter is 2 * (600w + 260h) = 1720 
        */
        .data-pulse-glow {
            stroke: var(--spec-cyan);
            stroke-width: 6;
            fill: none;
            stroke-dasharray: 150 280; /* Length of pulse vs gap */
            stroke-linecap: round;
            animation: flow 12s linear infinite, shimmer 2s ease-in-out infinite alternate;
        }

        .data-pulse-core {
            stroke: var(--white);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 150 280;
            stroke-linecap: round;
            animation: flow 12s linear infinite;
        }

        @keyframes flow {
            from { stroke-dashoffset: 1720; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes shimmer {
            0% { opacity: 0.3; filter: brightness(0.8); }
            100% { opacity: 1; filter: brightness(1.4); }
        }
    </style>
</head>
<body>

    <div class="mockup-container">
        <!-- SVG Connecting Lines -->
        <svg class="lines-overlay" viewBox="0 0 1200 600">
            <defs>
                <!-- Blur filter for the glowing shimmer -->
                <filter id="glow-blur" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="blur" /> <!-- Double merge for intensity -->
                    </feMerge>
                </filter>
            </defs>

            <!-- Base faint track connecting all cards (Horizontal & Vertical links) -->
            <rect x="300" y="170" width="600" height="260" rx="8" class="base-line" />
            
            <!-- Thick, blurry glowing data line -->
            <rect x="300" y="170" width="600" height="260" rx="8" class="data-pulse-glow" filter="url(#glow-blur)" />
            
            <!-- Thin, bright core of the data line -->
            <rect x="300" y="170" width="600" height="260" rx="8" class="data-pulse-core" />
        </svg>

        <!-- Center Logo (Using transparent background placeholder) -->
        <div class="logo-center">
            <img src="https://placehold.co/250x100/transparent/white?text=stadli&font=inter" alt="Stadli Logo" class="img-fluid">
        </div>

        <!-- UI Cards -->
        <div class="feature-card top-left">
            <h3>Ticketing</h3>
        </div>

        <div class="feature-card top-right">
            <h3>Analytics</h3>
        </div>

        <div class="feature-card bottom-left">
            <h3>Marketing<br>campaigns</h3>
        </div>

        <div class="feature-card bottom-right">
            <h3>CRM</h3>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
