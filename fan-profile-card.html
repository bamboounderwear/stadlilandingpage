<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360 Fan Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --black: #020202;
    --gray-100: #e8e8e8;
    --gray-200: #d6d6d6;
    --gray-300: #c0c0c0;
    --gray-400: #929292;
    --gray-500: #6a6a6a;
    --gray-600: #484848;
    --gray-700: #303030;
    --gray-800: #1a1a1a;
    --gray-900: #010101;
    --primary: var(--gray-100);
    --secondary: var(--gray-400);
    --success: #7ec7a3;
    --info: #7cb0ce;
    --warning: #d7b06b;
    --danger: #d28b86;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--gray-900);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .builder-container {
    width: 1200px;
    height: 600px;
    background-color: var(--gray-800);
    border-radius: 12px;
    border: 1px solid var(--gray-700);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Card Carousel Layout ── */
  .card-carousel {
    position: relative;
    width: 700px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Shared Fan Card Base ── */
  .fan-card {
    background-color: var(--gray-800);
    border: 1px solid var(--gray-600);
    border-radius: 12px;
    padding: 28px 32px 32px;
    width: 380px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }

  /* ── Side Cards (blurred / faded) ── */
  .fan-card.card-left,
  .fan-card.card-right {
    filter: blur(3px);
    opacity: 0.45;
    z-index: 1;
    width: 340px;
    padding: 24px 28px 28px;
  }

  .fan-card.card-left {
    left: -200px;
  }

  .fan-card.card-right {
    right: -200px;
  }

  .side-profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-top: 12px;
  }

  .side-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--gray-600);
  }

  .side-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-200);
    text-align: center;
  }

  .side-role {
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-400);
    letter-spacing: 0.5px;
  }

  /* ── Center Card (focused) ── */
  .fan-card.card-center {
    z-index: 3;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
  }

  .section-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-100);
    margin-bottom: 20px;
  }

  /* ── Profile Header ── */
  .profile-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--gray-700);
  }

  .profile-avatar {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gray-600);
    flex-shrink: 0;
  }

  .profile-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .profile-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--gray-100);
  }

  .profile-role-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .profile-role {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-400);
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: var(--success);
    flex-shrink: 0;
  }

  /* ── Stats Rows ── */
  .stats-list {
    display: flex;
    flex-direction: column;
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--gray-700);
  }

  .stat-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-100);
  }

  .stat-value .unit {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-400);
  }
</style>
</head>
<body>

<div class="builder-container">
  <div class="card-carousel">

    <!-- Left Card (blurred) -->
    <div class="fan-card card-left">
      <div class="side-profile">
        <img src="https://placehold.co/72x72/303030/929292?text=JB" alt="Jenn B." class="side-avatar">
        <div class="side-name">Jenn Bennett</div>
        <div class="side-role">Tour Pass Holder</div>
      </div>
    </div>

    <!-- Center Card (focused) -->
    <div class="fan-card card-center">
      <div class="section-title">360 Fan Profile</div>

      <div class="profile-header">
        <img src="https://placehold.co/76x76/303030/929292?text=MG" alt="Marcus Grant" class="profile-avatar">
        <div class="profile-info">
          <div class="profile-name">Marcus Grant</div>
          <div class="profile-role-row">
            <span class="profile-role">Tour Pass Holder</span>
            <span class="status-dot"></span>
          </div>
        </div>
      </div>

      <div class="stats-list">
        <div class="stat-row">
          <span class="stat-label">Purchases</span>
          <span class="stat-value">5</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Engagement Score</span>
          <span class="stat-value">87</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Attendance Rate</span>
          <span class="stat-value">75 <span class="unit">%</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Lifetime Value</span>
          <span class="stat-value">$1,250</span>
        </div>
      </div>
    </div>

    <!-- Right Card (blurred) -->
    <div class="fan-card card-right">
      <div class="side-profile">
        <img src="https://placehold.co/72x72/303030/929292?text=SB" alt="S. Bonhamm" class="side-avatar">
        <div class="side-name">S. Bonhamm</div>
        <div class="side-role">Pass Holder</div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
