<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadium Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --black: #020202;
    --gray-100: #e8e8e8;
    --gray-200: #d6d6d6;
    --gray-300: #c0c0c0;
    --gray-400: #929292;
    --gray-500: #6a6a6a;
    --gray-600: #484848;
    --gray-700: #303030;
    --gray-800: #1a1a1a;
    --gray-900: #010101;
    --primary: var(--gray-100);
    --secondary: var(--gray-400);
    --success: #7ec7a3;
    --info: #7cb0ce;
    --warning: #d7b06b;
    --danger: #d28b86;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--gray-900);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .builder-container {
    width: 1200px;
    height: 600px;
    background-color: var(--gray-800);
    border-radius: 12px;
    border: 1px solid var(--gray-700);
    display: flex;
    overflow: hidden;
  }

  /* ── Left: Seat Map ── */
  .seatmap-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    min-width: 0;
  }

  .seatmap-panel img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }

  /* ── Right: Cart ── */
  .cart-panel {
    width: 480px;
    min-width: 480px;
    border-left: 1px solid var(--gray-700);
    display: flex;
    flex-direction: column;
  }

  .cart-wrapper {
    border: 1px solid var(--gray-600);
    border-radius: 10px;
    margin: 24px 28px;
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .cart-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--gray-300);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 20px 24px 16px;
  }

  /* ── Cart Items ── */
  .cart-items {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
    gap: 0;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--gray-700);
  }

  .cart-item:last-child {
    border-bottom: none;
  }

  .item-thumb {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    border: 1px solid var(--gray-600);
    overflow: hidden;
    flex-shrink: 0;
    background-color: var(--gray-700);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .item-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .item-details {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .item-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-100);
  }

  .item-unit-price {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-400);
  }

  .item-total {
    font-size: 16px;
    font-weight: 600;
    color: var(--gray-300);
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Cart Footer ── */
  .cart-footer {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--gray-600);
  }

  .subtotal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .subtotal-label {
    font-size: 18px;
    font-weight: 600;
    color: var(--gray-200);
  }

  .subtotal-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--gray-100);
  }

  .checkout-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px;
    background-color: var(--gray-200);
    color: var(--gray-900);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s ease;
    text-decoration: none;
    letter-spacing: 0.5px;
  }

  .checkout-btn:hover {
    background-color: var(--white);
  }
</style>
</head>
<body>

<div class="builder-container">

  <!-- Left: Seat Map -->
  <div class="seatmap-panel">
    <img src="https://placehold.co/520x520/111111/484848?text=Stadium+Seatmap" alt="Stadium seat map">
  </div>

  <!-- Right: Cart -->
  <div class="cart-panel">
    <div class="cart-wrapper">
      <div class="cart-title">Cart</div>

      <div class="cart-items">
        <!-- Merch Jersey -->
        <div class="cart-item">
          <div class="item-thumb">
            <img src="https://placehold.co/72x72/303030/929292?text=Jersey" alt="Merch Jersey">
          </div>
          <div class="item-details">
            <span class="item-name">Merch Jersey</span>
            <span class="item-unit-price">$50,00</span>
          </div>
          <span class="item-total">$50,00</span>
        </div>

        <!-- Ticket -->
        <div class="cart-item">
          <div class="item-thumb">
            <img src="https://placehold.co/72x72/303030/929292?text=Ticket+A10" alt="Ticket A10">
          </div>
          <div class="item-details">
            <span class="item-name">Ticket</span>
            <span class="item-unit-price">$75,00</span>
          </div>
          <span class="item-total">$75,00</span>
        </div>

        <!-- Digital Gift Card -->
        <div class="cart-item">
          <div class="item-thumb">
            <img src="https://placehold.co/72x72/303030/929292?text=Gift+Card" alt="Digital Gift Card">
          </div>
          <div class="item-details">
            <span class="item-name">Digital Gift Card</span>
            <span class="item-unit-price">$25,00</span>
          </div>
          <span class="item-total">$25,00</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="cart-footer">
        <div class="subtotal-row">
          <span class="subtotal-label">Subtotal</span>
          <span class="subtotal-value">$150.00</span>
        </div>
        <a href="#" class="checkout-btn">Checkout</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
