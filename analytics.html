<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard Mockup</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette */
            --white: #ffffff;
            --black: #020202;
            --gray-100: #e8e8e8;
            --gray-200: #d6d6d6;
            --gray-300: #c0c0c0;
            --gray-400: #929292;
            --gray-500: #6a6a6a;
            --gray-600: #484848;
            --gray-700: #303030;
            --gray-800: #1a1a1a;
            --gray-900: #010101;

            /* Semantic Colors (Dark Theme Defaults) */
            --bg-body: var(--gray-900);
            --card-bg: var(--gray-900);
            --text-primary: var(--white);
            --text-secondary: var(--gray-500);

            /* Spectrum tokens — data-viz surfaces only */
            --spec-green:  #44d62b;
            --spec-orange: #fe5619;
            --spec-red:    #fe0000;

            /* Trend Colors (data viz — mapped to spectrum) */
            --trend-up: var(--spec-green);
            --trend-neutral: var(--spec-orange);
            --trend-down: var(--spec-red);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 1200x600 Container Requirement */
        .mockup-container {
            width: 1200px;
            height: 600px;
            background-color: var(--gray-900);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            width: 90%;
            max-width: 1000px;
        }

        .stat-card {
            background-color: var(--gray-900);
            border: 1px solid var(--gray-800);
            border-radius: 24px;
            padding: 40px 32px 32px 32px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--white);
            letter-spacing: -0.02em;
        }

        .trend-container {
            height: 60px;
            width: 100%;
            margin-top: auto;
            position: relative;
        }

        /* Chart-like SVGs */
        .trend-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .path-up { stroke: var(--trend-up); filter: drop-shadow(0 0 8px rgba(68, 214, 43, 0.3)); }
        .path-neutral { stroke: var(--trend-neutral); filter: drop-shadow(0 0 8px rgba(254, 86, 25, 0.3)); }
        .path-down { stroke: var(--trend-down); filter: drop-shadow(0 0 8px rgba(254, 0, 0, 0.3)); }

        .gradient-fill {
            opacity: 0.1;
        }

        /* Background texture for the container to match the image vibe */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }
    </style>
</head>
<body>

    <div class="mockup-container">
        <div class="vignette"></div>
        
        <div class="stats-grid">
            
            <!-- Revenue Card -->
            <div class="stat-card">
                <div class="stat-label">Revenue</div>
                <div class="stat-value">$45,732</div>
                <div class="trend-container">
                    <svg class="trend-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="grad-up" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--trend-up);stop-opacity:0.2" />
                                <stop offset="100%" style="stop-color:var(--trend-up);stop-opacity:0" />
                            </linearGradient>
                        </defs>
                        <path d="M0,50 Q20,45 40,48 T80,42 T120,35 T160,25 T200,10" fill="transparent" stroke-width="3" stroke-linecap="round" class="path-up" />
                        <path d="M0,50 Q20,45 40,48 T80,42 T120,35 T160,25 T200,10 L200,60 L0,60 Z" fill="url(#grad-up)" stroke="none" class="gradient-fill" />
                    </svg>
                </div>
            </div>

            <!-- Conversion Rate Card -->
            <div class="stat-card">
                <div class="stat-label">Conversion Rate</div>
                <div class="stat-value">3.9%</div>
                <div class="trend-container">
                    <svg class="trend-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
                        <defs>
                            <linearGradient id="grad-neutral" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:var(--trend-neutral);stop-opacity:0.2" />
                                <stop offset="100%" style="stop-color:var(--trend-neutral);stop-opacity:0" />
                            </linearGradient>
                        </defs>
                        <path d="M0,45 Q15,55 30,45 T60,35 T90,50 T120,40 T150,30 T180,45 T200,45" fill="transparent" stroke-width="3" stroke-linecap="round" class="path-neutral" />
                        <path d="M0,45 Q15,55 30,45 T60,35 T90,50 T120,40 T150,30 T180,45 T200,45 L200,60 L0,60 Z" fill="url(#grad-neutral)" stroke="none" class="gradient-fill" />
                    </svg>
                </div>
            </div>

            <!-- Per Cap Card -->
            <div class="stat-card">
                <div class="stat-label">Per Cap $</div>
                <div class="stat-value">$18.27</div>
                <div class="trend-container">
                    <svg class="trend-svg" viewBox="0 0 200 60" preserveAspectRatio="none">
                        <!-- Reusing grad-up for a positive trend -->
                        <path d="M0,55 Q30,50 60,42 T100,35 T140,25 T180,15 T200,5" fill="transparent" stroke-width="3" stroke-linecap="round" class="path-up" />
                        <path d="M0,55 Q30,50 60,42 T100,35 T140,25 T180,15 T200,5 L200,60 L0,60 Z" fill="url(#grad-up)" stroke="none" class="gradient-fill" />
                    </svg>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
